<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin and Padding</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .daba {
            /* background-color: crimson; */
            width: 100px;
            height: 100px;
            margin: 40px;
            padding: 20px;
            border: 2px solid rgb(214, 208, 208);
            border-radius: 10px;
            /* display: inline-block; */
        }
        .parent{
            height: 100vh;
            display: flex;
            justify-content: space-between;
            align-items: end;
        }
        
    </style>
</head>

<body>
    <div class="parent">
        <div class="daba">
            <p>Daba 1</p>
        </div>
        <div class="daba">
            <p>Daba 2</p>
        </div>
        <div class="daba">
            <p>Daba 3</p>
        </div>
    </div>

</body>

</html>
