<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hover{
            width: 100px;
            height: 100px;
            background-color: palevioletred;
            border: 3px solid black;
            margin-bottom: 100px;
        }
        .hover:hover{
            width: 200px;
            height: 200px;
            background-color: chocolate;
            border: 3px solid black;
        }
        .hover:active{
            width: 100px;
            height: 100px;
            background-color: maroon;
            border: 3px solid black;
        }
        .active{
            width: 100px;
            height: 100px;
            background-color: teal;
            border: 3px solid black;
        }
        .active:active{
            width: 100px;
            height: 100px;
            background-color: rgb(114, 1, 1);
            border: 3px solid black;
            border-radius: 50%;
            text-decoration: mediumseagreen underline wavy;
        }

    </style>
</head>
<body>
    <div class="hover">Hover Property</div>
    <div class="active">Active</div>
</body>
</html>
