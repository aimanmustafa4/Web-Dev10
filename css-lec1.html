<body>
    <!-- Css holds three ways to style
     1- inline

     2 and 3 type of styling in used in head tag
     2- internal
     3- external -->

    <!-- 1- Inline styling -->
    <h1 style="background-color: aqua; color: blueviolet;">Today is a rainy day.</h1>


    <!-- 2- Internal styling -->
    <!-- the style tag in used in the head tag , and call out selectors to style-->
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatum nihil nisi recusandae quia eaque nemo unde
        vitae esse nulla similique, nobis corporis maiores vel voluptas numquam sit ullam qui maxime.</p>

    <!-- 3- External styling uses a separate css file and link it with its respective html file in head tag -->
</body>
