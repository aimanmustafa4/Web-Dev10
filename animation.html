<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            border: 3px solid black;
            background-color: yellow;
            position: relative;
            top: 50px;
            left: 100px;
            /* animation-name: colorAnimate;
            animation-duration: 2s;
            animation-timing-function: ease-in;
            animation-delay: .5s;
            animation-iteration-count: 2;
            animation-direction: normal; */
            animation: colorAnimate 3s ease 1s infinite reverse;
        }

        @keyframes colorAnimate {
            0% {
                width: 100px;
                height: 100px;
                border: 3px solid black;
                background-color: yellow;
                font-size: 20px;
            }
            50%{
                border: 3px solid rgb(232, 4, 95);
                background-color: rgb(110, 3, 136);
                /* font-size: 50px; */

            }

            100% {
                border: 3px solid rgb(23, 12, 233);
                background-color: rgb(11, 140, 195);
                /* font-size: 50px; */
            }
        }
    </style>
</head>

<body>
    <div class="box">
        Animation box
    </div>
</body>

</html>
