<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css lec 2</title>
    <style>
        /* there are 4 types of selector */
        /*1- Universal: the symbol used for universal selector is(*) */
        * {
            
            color: blueviolet;
        }

        /* 2- tag selector */
        h1 {
            color: rgb(43, 223, 11);
        }

        p {
            color: chartreuse;
        }

        /* 3- Class Selector: is called out by . */
        .head {
            color: rgb(216, 189, 17);
            background-color: rgb(122, 97, 88);
            text-align: center;
            text-decoration: rgb(216, 189, 17) underline wavy;
            font-weight: 200;
            font-size: 30px;
            font-family: Georgia, 'Times New Roman', Times, serif;
            width: 400px;
            height: 50px;
            border-top: 10px solid black;
            border-left: 10px solid black;
            border-radius: 50px;
        }

        /* 4- Id Selector: is called out by # */
        #para {
            color: magenta;
            background-color: rgb(122, 97, 88);
            text-align: center;
            text-decoration: rgb(216, 189, 17) underline wavy;
            font-weight: 200;
            font-size: 30px;
            font-family: Georgia, 'Times New Roman', Times, serif;
            width: 400px;
            height: 350px;
            padding: 10px;
            border-top: 10px solid black;
            border-left: 10px solid black;
            border-radius: 50px;
        }
    </style>
</head>

<body>
    <h1 class="head">This is a lecture page.</h1>

    <p id="para">Lorem ipsum dolor sit amet consectetur adipisicing elit. Neque amet libero ipsam. Reprehenderit iste
        tempore accusamus recusandae ipsum animi veniam natus? Assumenda explicabo at iusto, commodi illo corrupti
        reiciendis perferendis?</p>

</body>

</html>
